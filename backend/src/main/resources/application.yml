spring:
  application:
    name: dispatchflow-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:dispatchflow}
    username: ${DB_USERNAME:dispatchflow}
    password: ${DB_PASSWORD:dispatchflow}
    driver-class-name: org.postgresql.Driver

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8081}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  jwt:
    secret: ${JWT_SECRET:DispatchFlowSecretKeyForJWTSigningMustBeAtLeast32Chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  seed-admin:
    enabled: ${SEED_ADMIN:true}
    email: ${ADMIN_EMAIL:admin@dispatchflow.com}
    password: ${ADMIN_PASSWORD:admin12345}
    first-name: System
    last-name: Admin
  documents:
    storage-path: ${DOCUMENTS_STORAGE_PATH:uploads}
  loads:
    operating-cost-per-mile: ${OPERATING_COST_PER_MILE:1.75}
  deadhead:
    geocoding-url: ${DEADHEAD_GEOCODING_URL:https://nominatim.openstreetmap.org}
    routing-url: ${DEADHEAD_ROUTING_URL:https://router.project-osrm.org}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.springframework.security: INFO
    com.dispatchflow: DEBUG
