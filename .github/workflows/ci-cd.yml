name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  DB_NAME: dispatchflow
  DB_USERNAME: dispatchflow
  DB_PASSWORD: dispatchflow
  JWT_SECRET: DispatchFlowSecretKeyForJWTSigningMustBeAtLeast32Chars

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dispatchflow
          POSTGRES_USER: dispatchflow
          POSTGRES_PASSWORD: dispatchflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dispatchflow -d dispatchflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      SEED_ADMIN: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x backend/mvnw

      - name: Build and test backend
        run: ./backend/mvnw -f backend/pom.xml clean verify

      - name: Upload backend artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  frontend:
    name: Dispatcher Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  frontend-admin:
    name: Admin Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        working-directory: frontend-admin
        run: npm ci

      - name: Lint
        working-directory: frontend-admin
        run: npm run lint

      - name: Build
        working-directory: frontend-admin
        run: npm run build

      - name: Upload admin artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-dist
          path: frontend-admin/dist
          retention-days: 7

  cd:
    name: CD — Package Release
    runs-on: ubuntu-latest
    needs: [backend, frontend, frontend-admin]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Display release structure
        run: find release -type f | head -50

      - name: Upload combined release bundle
        uses: actions/upload-artifact@v4
        with:
          name: dispatchflow-release
          path: release/
          retention-days: 30
